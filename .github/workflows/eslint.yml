# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '24 6 * * 4'

env:
  ESLINT_SECURITY_CONFIG: |
    {
      "root": true,
      "env": {
        "es2022": true,
        "node": true
      },
      "parser": "@typescript-eslint/parser",
      "parserOptions": {
        "ecmaVersion": "latest",
        "sourceType": "module"
      },
      "globals": {
        "fetch": "readonly"
      },
      "rules": {
        "eqeqeq": "error",
        "no-debugger": "error"
      },
      "overrides": [
        {
          "files": ["**/*.js", "**/*.jsx"],
          "rules": {
            "no-undef": "error"
          }
        }
      ]
    }

jobs:
  eslint-pr:
    name: Run eslint scanning for pull requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install ESLint
        run: npm install --no-save --ignore-scripts eslint@8.57.1 @typescript-eslint/parser@8.46.3 typescript@5.9.3

      - name: Write ESLint config
        run: printf '%s\n' "$ESLINT_SECURITY_CONFIG" > eslint-security.json

      - name: Run ESLint
        run: npx eslint .
          --no-eslintrc
          --no-ignore
          --config eslint-security.json
          --ext .js,.jsx,.ts,.tsx

  eslint-sarif:
    name: Run eslint scanning and upload SARIF
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install ESLint
        run: npm install --no-save --ignore-scripts eslint@8.57.1 @typescript-eslint/parser@8.46.3 typescript@5.9.3 @microsoft/eslint-formatter-sarif@3.1.0

      - name: Write ESLint config
        run: printf '%s\n' "$ESLINT_SECURITY_CONFIG" > eslint-security.json

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: npx eslint .
          --no-eslintrc
          --no-ignore
          --config eslint-security.json
          --ext .js,.jsx,.ts,.tsx
          --format @microsoft/eslint-formatter-sarif
          --output-file eslint-results.sarif
        continue-on-error: true

      - name: Verify ESLint SARIF
        run: test -f eslint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
