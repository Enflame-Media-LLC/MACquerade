# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates Microsoft Security DevOps static analysis with
# GitHub code scanning. For documentation, visit
# https://github.com/microsoft/security-devops-action
name: OSSAR

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '37 5 * * 1'

permissions:
  contents: read

jobs:
  OSSAR-Scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # required for private repository SARIF uploads
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Run Microsoft Security DevOps
      uses: microsoft/security-devops-action@08976cb623803b1b36d7112d4ff9f59eae704de0 # v1.12.0
      id: msdo
      with:
        # MSDO's applicable default tools for this repo are antimalware, checkov,
        # eslint, and templateanalyzer. ESLint is intentionally excluded: it is
        # already covered by the dedicated ESLint SARIF workflow (eslint.yml), and
        # the MSDO-bundled ESLint hard-fails on this repo (exit code 2, "all files
        # matching **/*.{js,ts} are ignored") which breaks the whole OSSAR gate.
        # This keeps the full working scanner set enabled without the broken tool.
        tools: antimalware,checkov,templateanalyzer
      env:
        GDN_ESLINT_DISABLEDEFAULTCONFIGURATIONFILE: "true"

    - name: Verify Microsoft Security DevOps SARIF
      shell: pwsh
      run: |
        if (-not (Test-Path "${{ steps.msdo.outputs.sarifFile }}")) {
          throw "Microsoft Security DevOps did not produce a SARIF file."
        }

    - name: Upload OSSAR results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.msdo.outputs.sarifFile }}
